<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="2; url=http://localhost:3000" />
  <title>جاري التوجيه إلى نظام Aman HR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Cairo', sans-serif;
      background-color: #09090b;
      color: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 2rem;
      border: 1px solid #27272a;
      border-radius: 1rem;
      background-color: #18181b;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      animation: fadeIn 0.4s ease-out;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.85rem;
      color: #a1a1aa;
      margin-bottom: 1.5rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #27272a;
      border-top: 3px solid #fafafa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem auto;
    }
    .btn-manual {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #09090b;
      background-color: #fafafa;
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      transition: background-color 0.2s;
    }
    .btn-manual:hover {
      background-color: #e4e4e7;
    }
    .server-status {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid #27272a;
      font-size: 0.75rem;
      color: #71717a;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <script>
    // Redirect immediately if possible
    window.location.href = "http://localhost:3000";
  </script>
</head>
<body>

  <div class="container">
    <div class="spinner"></div>
    <h1>جاري فتح نظام Aman HR...</h1>
    <p>يتم الآن تحويلك تلقائياً إلى لوحة التحكم على الاستضافة المحلية.</p>
    
    <a href="http://localhost:3000" class="btn-manual">اضغط هنا للانتقال المباشر</a>

    <div class="server-status">
      تأكد من تشغيل خادم التطبيق المحلي (Next.js) ليعمل النظام بشكل صحيح.
    </div>
  </div>

</body>
</html>
